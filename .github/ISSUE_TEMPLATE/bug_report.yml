name: "🐛 Bug report"
description: Report a problem with JarvisVR
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please search existing issues first to avoid duplicates.
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of JarvisVR is affected?
      options:
        - unity-client (Quest 3 MR client)
        - agent-backend (the brain)
        - voice-service (wake / STT / TTS / ambient)
        - holo-tools (widget catalog)
        - shared-protocol (Py / C# / TS bindings)
        - infra (compose / mock / e2e)
        - docs
        - not sure
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I ..., JarvisVR ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `...`
        2. Send `...`
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / protocol frames
      description: Paste any error output or JSON messages. **Do not include API keys.**
      render: shell
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python/Node/Unity versions, LLM provider (e.g. mock/openai), Quest OS version.
      placeholder: |
        - OS:
        - Python:
        - LLM provider:
        - Quest OS:
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I removed any API keys/secrets from the logs above.
          required: true
