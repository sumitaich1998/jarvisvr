name: "✨ Feature request"
description: Suggest an idea or enhancement for JarvisVR
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Check the [roadmap](../../blob/main/docs/FEATURES.md) first — it might already be planned.
  - type: dropdown
    id: component
    attributes:
      label: Component / area
      options:
        - unity-client (Quest 3 MR client)
        - agent-backend (the brain)
        - voice-service (voice / audio)
        - holo-tools (a new widget)
        - shared-protocol (a new message)
        - infra / tooling
        - docs
        - cross-cutting / not sure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen. For a new widget or message, sketch the props/payload.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and the roadmap.
          required: true
